<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Add Hospital</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
<header>Add Hospital</header>

<div class="container">
  <form method="POST">
    <input type="text" name="id" placeholder="Hospital ID" required>
    <input type="text" name="location" placeholder="Location" required>
    <input type="number" name="beds" placeholder="Available Beds" required>
    <button class="btn" type="submit">Add Hospital</button>
  </form>
  <a class="btn" href="{{ url_for('admin_dashboard') }}">Back</a>
</div>

</body>
</html>
