<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Find Ambulance</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<header>Search Ambulance (BST)</header>

<div class="container">
  <form method="POST">
    <input type="text" name="id" placeholder="Enter Ambulance ID" required>
    <button class="btn" type="submit">Search</button>
  </form>

  {% if data %}
    {% for line in data %}
      <div class="card">{{ line }}</div>
    {% endfor %}
  {% endif %}

  <a class="btn" href="{{ url_for('admin_dashboard') }}">Back</a>
</div>

</body>
</html>
