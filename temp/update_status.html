<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Update Ambulance Status</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
<header>Update Ambulance Status</header>

<div class="container">
  <form method="POST">
    <input type="text" name="id" placeholder="Ambulance ID" required>

    <select name="status">
      <option value="available">Available</option>
      <option value="busy">Busy</option>
    </select>

    <button class="btn" type="submit">Update</button>
  </form>

  <a class="btn" href="{{ url_for('admin_dashboard') }}">Back</a>
</div>

</body>
</html>
